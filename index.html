<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/10_others/favicon.svg" type="image/x-icon">
    <title>El Pollo Loco</title>

    <script src="models/drawable-object.class.js"></script>
    <script src="models/movable-object.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/small-chicken.class.js"></script>
    <script src="models/cloud.class.js"></script>
    <script src="models/collectible-bottle.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="models/bottle-status-bar.class.js"></script>
    <script src="models/boss-statusbar.class.js"></script>
    <script src="models/coin.class.js"></script>
    <script src="models/coin-status-bar.class.js"></script>
    <script src="models/world.class.js"></script>
    <script src="models/background-object.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/level.class.js"></script>
    <script src="models/throwable-object.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="levels/level1.js"></script>
    <script src="js/game.js"></script>
    <script src="script.js"></script>
</head>

<body onload="init()">
    <h1>El Pollo Loco</h1>

    <canvas id="canvas" width="720" height="480">

    </canvas>

    <div id="game-over-screen" class="hidden">
        <img src="img/9_intro_outro_screens/game_over/game over.png" alt="Game Over">
    </div>

    <div id="you-won-screen" class="hidden">
        <img src="img/You won, you lost/You Won B.png" alt="You Won">
    </div>

    <div class="menu-buttons">
        <button id="start-btn" onclick="startGame()" onkeydown="handleBtnKeyDown(event)">
            start game
        </button>

        <button id="instruction-btn" onclick="openControls()" onkeydown="handleBtnKeyDown(event)">
            instruction
        </button>
    </div>

    <dialog id="controls-dialog" onclick="closeControlsOutside(event)">
        <button onclick="closeControls()">X</button>
        <div class="dialog-container">
            <h2>INSTRUCTION</h2>
            <ol>
                <li><strong>left & right arrow key:</strong> walk</li>
                <li><strong>space:</strong> jump</li>
                <li><strong>D key:</strong> throw bottle</li>
                <li><strong>enter key:</strong> start game</li>
            </ol>
    </dialog>
    </div>

</body>

</html>
